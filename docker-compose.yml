version: '3.8'

services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/

  usuario-ms:
    build: ./usuario-ms
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_usuario
      - spring.datasource.username=root
      - spring.datasource.password=123456789

  restaurante-ms:
    build: ./restaurante-ms
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_restaurante
      - spring.datasource.username=root
      - spring.datasource.password=123456789

  menu-ms:
    build: ./menu-ms
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_menu
      - spring.datasource.username=root
      - spring.datasource.password=123456789

  reserva-ms:
    build: ./reserva-ms
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_reserva
      - spring.datasource.username=root
      - spring.datasource.password=123456789

  calificacion-ms:
    build: ./calificacion-ms
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_calificacion
      - spring.datasource.username=root
      - spring.datasource.password=123456789

  gateway-proxy:
    build: ./gateway-proxy
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - usuario-ms
      - restaurante-ms
      - menu-ms
      - reserva-ms
      - calificacion-ms
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DESTINO_USUARIO=http://usuario-ms:8081
      - DESTINO_RESTAURANTE=http://restaurante-ms:8082
      - DESTINO_MENU=http://menu-ms:8083
      - DESTINO_RESERVA=http://reserva-ms:8084
      - DESTINO_CALIFICACION=http://calificacion-ms:8085